defaults:
  - _self_

run_id: null

output:
  root_dir: validation_outputs

validations:
  enabled:
    - dataset_validation
    - prediction_metrics

data:
  pipeline_config: data/configs/pipeline.yaml
  dataset_version: kv-core5-ms-20260522-213108
  final_subdir: qwen25_vl_sft
  train_json_name: qwen25_vl_train.json
  val_json_name: qwen25_vl_val.json
  test_json_name: qwen25_vl_test.json
  splits:
    - val
    - test
  huggingface:
    repo_id: your-org/placeholder-dataset
    archive_name: kv-core5-ms-latest.tar.gz
    archive_name_template: "{dataset_name}-{dataset_version}.tar.gz"
    revision: main
    repo_type: dataset
    token_env: HF_TOKEN
    force_download: false

dataset_validation:
  check_image_decode: true
  include_prepared_qwen_export: true
  require_prepared_qwen_export: true
  include_project_stage_roots: true
  dataset_roots: []

prediction_metrics:
  split: test
  limit: null

inference:
  model:
    name_or_path: Qwen/Qwen2.5-VL-3B-Instruct
    artifact_dir: qwen2.5-vl-disease-lora/inference
    adapter_path: null
    processor_path: null
    torch_dtype: bfloat16
    attn_implementation: flash_attention_2
    device_map: auto
    low_cpu_mem_usage: true
    use_cache: true
    merge_adapter: false
    min_pixels: 200704
    max_pixels: 451584
  quantization:
    enabled: true
    bits: 4
    quant_type: nf4
    double_quant: true
    compute_dtype: bfloat16
  runtime:
    backend: transformers_peft
    auto_prepare: true
    auto_install: true
    prefer_hub_kernels: true
    install_liger_kernel: auto
    liger_mode: auto
    torch_compile_mode: auto
    pip_timeout_sec: 1800
    report_path: null
    tf32: true
    batch_size: auto
    num_workers: 0
    matmul_precision: high
  generation:
    max_new_tokens: 160
    do_sample: false
    temperature: 0.0
    top_p: 1.0
    repetition_penalty: 1.0

logging:
  level: INFO
